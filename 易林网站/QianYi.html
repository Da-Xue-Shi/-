        let availableData = [...originalData];

        function updateCounter() {
            document.getElementById('counter').innerText = `签筒余签: ${availableData.length}`;
            if (availableData.length === 0) {
                document.getElementById('drawBtn').disabled = true;
                document.getElementById('drawBtn').innerText = "签筒已空";
                document.getElementById('resetBtn').style.display = "inline-block";
            } else {
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('drawBtn').innerText = "沐手抽签";
            }
        }

        // 初始更新计数
        updateCounter();

        function drawLot() {
            if (availableData.length === 0) return;
            const randomIndex = Math.floor(Math.random() * availableData.length);
            const lot = availableData[randomIndex];
            availableData.splice(randomIndex, 1);
            document.getElementById('lotId').innerText = `第 ${lot.id} 签`;
            document.getElementById('lotName').innerText = lot.name;
            document.getElementById('lotCategory').innerText = lot.category;
            document.getElementById('lotText').innerText = `「${lot.text}」`;
            document.querySelector('#lotZan span').innerText = lot.zan;
            document.querySelector('#lotShi span').innerText = lot.shi;
            document.querySelector('#lotZhui span').innerText = lot.zhui;
            document.getElementById('resultCard').style.display = "block";
            updateCounter();
            document.getElementById('resetBtn').style.display = "inline-block";
        }
        function resetLots() {
            availableData = [...originalData];
            document.getElementById('resultCard').style.display = "none";
            document.getElementById('resetBtn').style.display = "none";
            updateCounter();
            alert("已重新洗牌，签筒全满！");
